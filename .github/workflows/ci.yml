name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Validate release metadata
        run: python3 scripts/validate_release.py

      - name: Check skill script CLIs
        run: |
          python3 skills/my-fund/scripts/fetch_portfolio.py --help
          python3 skills/my-fund/scripts/inspect_portfolio_response.py --help

      - name: Install MCP package
        working-directory: mcp-servers/src/my-fund
        run: uv sync --locked

      - name: Run MCP tests
        working-directory: mcp-servers/src/my-fund
        run: uv run python -m unittest discover -s tests

      - name: Compile Python sources
        working-directory: mcp-servers/src/my-fund
        run: uv run python -m compileall src tests
